services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: sibsiu
      DB_USER: postgres
      DB_PASSWORD: "111111"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  seed:
    build: .
    command: node seed.js
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: sibsiu
      DB_USER: postgres
      DB_PASSWORD: "111111"
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  db:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: sibsiu
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "111111"
      POSTGRES_HOST_AUTH_METHOD: md5
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  pgdata:
